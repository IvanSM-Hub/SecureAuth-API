name: Docker SecureAuth-api CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v6.0.2
      id: version
      with:
        major_pattern: "major:"
        minor_pattern: "feat:"
        version_format: "${major}.${minor}.${patch}-prereleases${increment}"

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v4.1.0
      
    - name: Docker login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      env:
        NEW_VERSION: ${{steps.version.outputs.version}}
        DOCKERHUB_USERNAME: ${{secrets.DOCKERHUB_USERNAME}}
        DOCKERHUB_PROJECT: ${{secrets.DOCKERHUB_PROJECT}}
        DOCKERHUB_FILE: ${{secrets.DOCKERHUB_FILE}}
        PROJECT: ${{secrets.REPOSITORY}}
      run: |
        docker buildx build \
        --platform linux/amd64,linux/arm64 \
        -f $DOCKERHUB_FILE \
        -t $DOCKERHUB_USERNAME/$DOCKERHUB_PROJECT:$NEW_VERSION \
        -t $DOCKERHUB_USERNAME/$DOCKERHUB_PROJECT:latest \
        --push \
        $PROJECT
